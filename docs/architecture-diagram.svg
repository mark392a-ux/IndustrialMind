  <line x1="780" y1="1176" x2="780" y2="1248" stroke="#2A2F42" stroke-width="1"/>
  <line x1="1020" y1="1176" x2="1020" y2="1248" stroke="#2A2F42" stroke-width="1"/>

  <text x="180" y="1194" text-anchor="middle" fill="#1D9E75" font-size="11" font-weight="700">PRIMARY (RCA/Compliance)</text>
  <text x="180" y="1214" text-anchor="middle" fill="#F0F2F8" font-size="13" font-weight="700">DeepSeek R1</text>
  <text x="180" y="1232" text-anchor="middle" fill="#6B7194" font-size="10">deepseek-reasoner</text>
  <text x="180" y="1246" text-anchor="middle" fill="#6B7194" font-size="10">chain-of-thought</text>

  <text x="420" y="1194" text-anchor="middle" fill="#7C6EE8" font-size="11" font-weight="700">PRIMARY (all agents)</text>
  <text x="420" y="1214" text-anchor="middle" fill="#F0F2F8" font-size="13" font-weight="700">Groq 70B</text>
  <text x="420" y="1232" text-anchor="middle" fill="#6B7194" font-size="10">llama-3.3-70b-versatile</text>

  <text x="660" y="1194" text-anchor="middle" fill="#378ADD" font-size="11" font-weight="700">FALLBACK 1</text>
  <text x="660" y="1214" text-anchor="middle" fill="#F0F2F8" font-size="13" font-weight="700">Groq 8B</text>
  <text x="660" y="1232" text-anchor="middle" fill="#6B7194" font-size="10">llama-3.1-8b-instant</text>
  <text x="660" y="1246" text-anchor="middle" fill="#6B7194" font-size="10">separate quota</text>

  <text x="900" y="1194" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="700">FALLBACK 2</text>
  <text x="900" y="1214" text-anchor="middle" fill="#F0F2F8" font-size="13" font-weight="700">Gemini 1.5 Flash</text>
  <text x="900" y="1232" text-anchor="middle" fill="#6B7194" font-size="10">1500 req/day free tier</text>

  <text x="1140" y="1194" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="700">LAST RESORT</text>
  <text x="1140" y="1214" text-anchor="middle" fill="#F0F2F8" font-size="13" font-weight="700">Friendly Error</text>
  <text x="1140" y="1232" text-anchor="middle" fill="#6B7194" font-size="10">"Wait 30–60 sec"</text>

  <text x="200" y="1180" fill="#6B7194" font-size="14">→</text>
  <text x="440" y="1180" fill="#6B7194" font-size="14">→</text>
  <text x="680" y="1180" fill="#6B7194" font-size="14">→</text>
  <text x="920" y="1180" fill="#6B7194" font-size="14">→</text>

  <line x1="660" y1="1260" x2="660" y2="1288" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 6: OUTPUT + FRONTEND ===================== -->
  <text x="60" y="1310" fill="#F0F2F8" font-size="12" font-weight="700" letter-spacing="1">6 · OUTPUT &amp; PRESENTATION</text>

  <rect x="230" y="1322" width="860" height="80" rx="12" fill="#171B26" stroke="#2A2F42"/>
  <text x="660" y="1350" text-anchor="middle" fill="#F0F2F8" font-size="13" font-weight="700">Structured Output Layer</text>
  <text x="660" y="1370" text-anchor="middle" fill="#A8AECB" font-size="11">Structured UI renderers (5-Why chain, gap cards, checklists) + ReportLab PDF generation</text>
  <text x="660" y="1388" text-anchor="middle" fill="#6B7194" font-size="10">No raw markdown — dedicated component per agent type</text>

  <line x1="660" y1="1402" x2="660" y2="1430" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="380" y="1430" width="560" height="70" rx="30" fill="#1A1535" stroke="#7C6EE8" stroke-width="2"/>
  <text x="660" y="1462" text-anchor="middle" fill="#F0F2F8" font-size="15" font-weight="700">React Frontend (Next.js)</text>
  <text x="660" y="1484" text-anchor="middle" fill="#A8AECB" font-size="10">Dashboard · React Flow KG explorer · ROI calculator · Activity panel</text>

  <!-- ===================== MIGRATION NOTE BOX ===================== -->
  <rect x="60" y="1540" width="1200" height="200" rx="14" fill="#0D1E3A" stroke="#378ADD" stroke-width="1.5"/>
  <text x="90" y="1572" fill="#378ADD" font-size="13" font-weight="700" letter-spacing="0.5">PROTOTYPE → PRODUCTION MIGRATION PATH</text>

  <text x="90" y="1602" fill="#F0F2F8" font-size="12" font-weight="600">Current (Prototype)</text>
  <text x="90" y="1622" fill="#A8AECB" font-size="11">• Local / Render deployment</text>
  <text x="90" y="1640" fill="#A8AECB" font-size="11">• NetworkX in-memory Knowledge Graph</text>
  <text x="90" y="1658" fill="#A8AECB" font-size="11">• ChromaDB local vector store</text>
  <text x="90" y="1676" fill="#A8AECB" font-size="11">• start.bat / start.sh local run scripts</text>

  <line x1="440" y1="1590" x2="440" y2="1690" stroke="#2A2F42" stroke-width="1"/>

  <text x="470" y="1602" fill="#F0F2F8" font-size="12" font-weight="600">Future (Production)</text>
  <text x="470" y="1622" fill="#22C27A" font-size="11">• Neo4j for persistent, queryable Knowledge Graph</text>
  <text x="470" y="1640" fill="#22C27A" font-size="11">• Pinecone / PGVector as managed cloud vector store</text>
  <text x="470" y="1658" fill="#22C27A" font-size="11">• Real-time IoT/SCADA ingestion via Kafka</text>
  <text x="470" y="1676" fill="#22C27A" font-size="11">• Docker/docker-compose + multi-tenant, RBAC-enabled deployment</text>

  <text x="90" y="1716" fill="#6B7194" font-size="10">The retrieval, agentic, and fallback layers are storage-agnostic — swapping NetworkX→Neo4j or ChromaDB→Pinecone requires no change to agent logic.</text>

  <text x="660" y="1758" text-anchor="middle" fill="#6B7194" font-size="10">IndustrialMind · ET AI Hackathon 2.0 (PS 8) · Architecture diagram · July 2026</text>
</svg>
