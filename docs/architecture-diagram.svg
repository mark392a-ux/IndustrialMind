  <line x1="1140" y1="944" x2="1140" y2="964" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="964" width="240" height="100" rx="12" fill="#171B26" stroke="#378ADD"/>
  <text x="180" y="990" text-anchor="middle" fill="#378ADD" font-size="13" font-weight="700">Copilot Agent</text>
  <text x="180" y="1010" text-anchor="middle" fill="#A8AECB" font-size="10">Expert Q&amp;A</text>
  <text x="180" y="1028" text-anchor="middle" fill="#6B7194" font-size="10">Session memory,</text>
  <text x="180" y="1044" text-anchor="middle" fill="#6B7194" font-size="10">source citations w/ pages</text>

  <rect x="380" y="964" width="240" height="100" rx="12" fill="#171B26" stroke="#22C27A"/>
  <text x="500" y="990" text-anchor="middle" fill="#22C27A" font-size="13" font-weight="700">RCA Agent</text>
  <text x="500" y="1010" text-anchor="middle" fill="#A8AECB" font-size="10">5-step chain</text>
  <text x="500" y="1028" text-anchor="middle" fill="#6B7194" font-size="10">symptom → multi-query RAG →</text>
  <text x="500" y="1044" text-anchor="middle" fill="#6B7194" font-size="10">graph traversal → synthesis</text>

  <rect x="700" y="964" width="240" height="100" rx="12" fill="#171B26" stroke="#F59E0B"/>
  <text x="820" y="990" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="700">Compliance Agent</text>
  <text x="820" y="1010" text-anchor="middle" fill="#A8AECB" font-size="10">Gap detection</text>
  <text x="820" y="1028" text-anchor="middle" fill="#6B7194" font-size="10">OISD / Factory Act / PESO /</text>
  <text x="820" y="1044" text-anchor="middle" fill="#6B7194" font-size="10">API 510/570 + corpus check</text>

  <rect x="1020" y="964" width="240" height="100" rx="12" fill="#171B26" stroke="#D85A30"/>
  <text x="1140" y="990" text-anchor="middle" fill="#D85A30" font-size="13" font-weight="700">Work Permit Agent</text>
  <text x="1140" y="1010" text-anchor="middle" fill="#A8AECB" font-size="10">PTW generation</text>
  <text x="1140" y="1028" text-anchor="middle" fill="#6B7194" font-size="10">LOTO steps, gas testing,</text>
  <text x="1140" y="1044" text-anchor="middle" fill="#6B7194" font-size="10">checklist, closure section</text>

  <line x1="180" y1="1064" x2="180" y2="1088" stroke="#6B7194" stroke-width="2"/>
  <line x1="500" y1="1064" x2="500" y2="1088" stroke="#6B7194" stroke-width="2"/>
  <line x1="820" y1="1064" x2="820" y2="1088" stroke="#6B7194" stroke-width="2"/>
  <line x1="1140" y1="1064" x2="1140" y2="1088" stroke="#6B7194" stroke-width="2"/>
  <line x1="180" y1="1088" x2="1140" y2="1088" stroke="#6B7194" stroke-width="2"/>
  <line x1="660" y1="1088" x2="660" y2="1108" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 5: 3-TIER LLM FALLBACK ===================== -->
  <text x="60" y="1134" fill="#EF4444" font-size="12" font-weight="700" letter-spacing="1">5 · LLM ORCHESTRATION — 3-TIER FALLBACK CHAIN</text>
  <text x="60" y="1152" fill="#6B7194" font-size="10">Every agent cascades automatically on rate-limit / server / balance errors — user never sees a raw 500</text>

  <rect x="60" y="1164" width="1200" height="96" rx="12" fill="#171B26" stroke="#2A2F42"/>
  <line x1="300" y1="1176" x2="300" y2="1248" stroke="#2A2F42" stroke-width="1"/>
