  <rect x="0" y="0" width="1320" height="1780" fill="#0F1117"/>

  <!-- Title -->
  <text x="660" y="46" text-anchor="middle" fill="#F0F2F8" font-size="24" font-weight="700">IndustrialMind — System Architecture</text>
  <text x="660" y="70" text-anchor="middle" fill="#6B7194" font-size="13">ET AI Hackathon 2.0 · PS 8 — Industrial Knowledge Intelligence</text>

  <!-- ===================== STAGE 1: INGESTION ===================== -->
  <text x="60" y="112" fill="#7C6EE8" font-size="12" font-weight="700" letter-spacing="1">1 · DOCUMENT INGESTION</text>
  <rect x="60" y="122" width="1200" height="90" rx="12" fill="#171B26" stroke="#2A2F42"/>
  <text x="90" y="150" fill="#F0F2F8" font-size="14" font-weight="600">Document Ingestion Pipeline</text>
  <text x="90" y="172" fill="#A8AECB" font-size="12">OISD standards · OEM manuals · CSB incident reports · Factory Act · P&amp;IDs (159 docs)</text>
  <text x="90" y="192" fill="#6B7194" font-size="11">LlamaParse + Unstructured + pdfplumber → chunking &amp; metadata tagging · Groq Vision (P&amp;ID parsing) · Groq LLM entity extraction</text>

  <line x1="660" y1="212" x2="660" y2="240" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 2: STORAGE (3 parallel) ===================== -->
  <text x="60" y="260" fill="#378ADD" font-size="12" font-weight="700" letter-spacing="1">2 · INDEXED STORAGE (built once, queried every request)</text>

  <rect x="60" y="272" width="370" height="110" rx="12" fill="#171B26" stroke="#22C27A"/>
  <text x="245" y="298" text-anchor="middle" fill="#22C27A" font-size="13" font-weight="700">ChromaDB</text>
  <text x="245" y="318" text-anchor="middle" fill="#A8AECB" font-size="11">Vector store</text>
  <text x="245" y="338" text-anchor="middle" fill="#6B7194" font-size="10">Semantic embeddings per chunk</text>
  <text x="245" y="356" text-anchor="middle" fill="#6B7194" font-size="10">159 chunks indexed</text>

  <rect x="465" y="272" width="370" height="110" rx="12" fill="#171B26" stroke="#378ADD"/>
  <text x="650" y="298" text-anchor="middle" fill="#378ADD" font-size="13" font-weight="700">BM25 Index</text>
  <text x="650" y="318" text-anchor="middle" fill="#A8AECB" font-size="11">rank_bm25 keyword index</text>
  <text x="650" y="338" text-anchor="middle" fill="#6B7194" font-size="10">Exact-term &amp; standard-code matching</text>
  <text x="650" y="356" text-anchor="middle" fill="#6B7194" font-size="10">(OISD-105, tag numbers, etc.)</text>

  <rect x="870" y="272" width="390" height="110" rx="12" fill="#171B26" stroke="#7C6EE8"/>
  <text x="1065" y="298" text-anchor="middle" fill="#7C6EE8" font-size="13" font-weight="700">Knowledge Graph (KG)</text>
  <text x="1065" y="318" text-anchor="middle" fill="#A8AECB" font-size="11">NetworkX (in-memory) · ISO 15926 Part 2 ontology</text>
  <text x="1065" y="338" text-anchor="middle" fill="#6B7194" font-size="10">423 nodes · 1,399 edges · 99.4% doc linkage</text>
  <text x="1065" y="356" text-anchor="middle" fill="#6B7194" font-size="10">FunctionalObject · PhysicalObject · Activity · Equipment · Document</text>

  <line x1="245" y1="382" x2="245" y2="410" x2="660" y2="410" stroke="#6B7194" stroke-width="2"/>
  <line x1="245" y1="382" x2="245" y2="410" stroke="#6B7194" stroke-width="2"/>
  <line x1="650" y1="382" x2="650" y2="410" stroke="#6B7194" stroke-width="2"/>
  <line x1="1065" y1="382" x2="1065" y2="410" stroke="#6B7194" stroke-width="2"/>
  <line x1="245" y1="410" x2="1065" y2="410" stroke="#6B7194" stroke-width="2"/>
  <line x1="660" y1="410" x2="660" y2="438" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 3: QUERY PATH START ===================== -->
  <text x="60" y="460" fill="#D85A30" font-size="12" font-weight="700" letter-spacing="1">3 · QUERY-TIME FLOW</text>

  <rect x="480" y="472" width="360" height="60" rx="30" fill="#1A1535" stroke="#7C6EE8"/>
  <text x="660" y="508" text-anchor="middle" fill="#F0F2F8" font-size="14" font-weight="600">User Query (Copilot / RCA / Compliance / Permit)</text>

  <line x1="660" y1="532" x2="660" y2="560" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="330" y="560" width="660" height="100" rx="12" fill="#171B26" stroke="#F59E0B"/>
  <text x="660" y="588" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="700">Query Expander (query_expander.py)</text>
  <text x="660" y="610" text-anchor="middle" fill="#A8AECB" font-size="11">Regex normalization → incident expansion map (Philadelphia, Husky, Texas City…) →</text>
  <text x="660" y="628" text-anchor="middle" fill="#A8AECB" font-size="11">LLM query expansion → compound proximity extraction → filename-aware boost</text>
  <text x="660" y="648" text-anchor="middle" fill="#6B7194" font-size="10">Fixes CSB / historical-incident retrieval failures</text>

  <line x1="660" y1="660" x2="660" y2="688" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="688" width="860" height="110" rx="12" fill="#171B26" stroke="#22C27A"/>
  <text x="660" y="716" text-anchor="middle" fill="#22C27A" font-size="13" font-weight="700">Hybrid Retrieval Engine</text>
  <text x="660" y="738" text-anchor="middle" fill="#A8AECB" font-size="11">ChromaDB vector search + BM25 keyword search + Cohere Rerank v3</text>
  <text x="660" y="758" text-anchor="middle" fill="#A8AECB" font-size="11">→ Knowledge Graph pre-retrieval enrichment (linked incidents, equipment history)</text>
  <text x="660" y="778" text-anchor="middle" fill="#6B7194" font-size="10">Proximity boosting · filename-aware scoring for CSB/incident docs</text>

  <line x1="660" y1="798" x2="660" y2="826" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 4: AGENT SUPERVISOR + 4 AGENTS ===================== -->
  <text x="60" y="848" fill="#22C27A" font-size="12" font-weight="700" letter-spacing="1">4 · AGENTIC LAYER (custom supervisor — no LangChain)</text>

  <rect x="330" y="860" width="660" height="64" rx="12" fill="#1A1535" stroke="#7C6EE8"/>
  <text x="660" y="888" text-anchor="middle" fill="#F0F2F8" font-size="13" font-weight="700">Agent Supervisor / Smart Intent Router</text>
  <text x="660" y="908" text-anchor="middle" fill="#6B7194" font-size="10">4-way classifier: copilot · rca · compliance · permit</text>

  <line x1="660" y1="924" x2="660" y2="944" stroke="#6B7194" stroke-width="2"/>
  <line x1="180" y1="944" x2="1140" y2="944" stroke="#6B7194" stroke-width="2"/>
  <line x1="180" y1="944" x2="180" y2="964" stroke="#6B7194" stroke-width="2" marker-end="url(#arrow)"/>
